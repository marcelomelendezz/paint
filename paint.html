<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 Paint Studio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Nunito:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1a2e;
    --panel: #16213e;
    --panel2: #0f3460;
    --accent: #e94560;
    --accent2: #f5a623;
    --text: #eaeaea;
    --border: #2a2a4a;
    --btn: #1e1e3f;
    --btn-hover: #2a2a5f;
    --active: #e94560;
    --canvas-bg: #ffffff;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* HEADER */
  header {
    background: var(--panel);
    border-bottom: 2px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    z-index: 10;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: 2px;
    white-space: nowrap;
  }

  .logo span { color: var(--accent2); }

  .header-group {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--btn);
    border-radius: 10px;
    padding: 4px 8px;
    border: 1px solid var(--border);
  }

  .header-group label {
    font-size: 0.72rem;
    color: #aaa;
    white-space: nowrap;
  }

  button.tool-btn {
    background: var(--btn);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  button.tool-btn:hover { background: var(--btn-hover); border-color: #555; }
  button.tool-btn.active { background: var(--active); border-color: var(--active); color: white; }

  input[type="range"] {
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: #555;
    outline: none;
    width: 80px;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  input[type="color"] {
    -webkit-appearance: none;
    width: 30px; height: 30px;
    border: 2px solid var(--border);
    border-radius: 50%;
    cursor: pointer;
    padding: 0;
    background: none;
    overflow: hidden;
  }

  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }

  .size-display {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    min-width: 24px;
    text-align: center;
    color: var(--accent2);
  }

  /* PALETTE */
  .palette {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    align-items: center;
  }

  .color-swatch {
    width: 22px; height: 22px;
    border-radius: 5px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.12s, border-color 0.12s;
    flex-shrink: 0;
  }

  .color-swatch:hover { transform: scale(1.2); }
  .color-swatch.selected { border-color: white; transform: scale(1.1); }

  /* CURRENT COLORS PREVIEW */
  .current-colors {
    position: relative;
    width: 42px; height: 42px;
    flex-shrink: 0;
  }

  .bg-color-box {
    position: absolute;
    bottom: 0; right: 0;
    width: 28px; height: 28px;
    border-radius: 5px;
    border: 2px solid #555;
    cursor: pointer;
  }

  .fg-color-box {
    position: absolute;
    top: 0; left: 0;
    width: 28px; height: 28px;
    border-radius: 5px;
    border: 2px solid #eee;
    cursor: pointer;
    z-index: 1;
  }

  .swap-btn {
    position: absolute;
    top: -4px; right: -4px;
    background: #333;
    border: 1px solid #555;
    color: white;
    border-radius: 50%;
    width: 16px; height: 16px;
    font-size: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 2;
    padding: 0;
  }

  /* MAIN AREA */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* LEFT TOOLBAR */
  .toolbar {
    background: var(--panel);
    border-right: 2px solid var(--border);
    padding: 10px 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 54px;
    align-items: center;
    overflow-y: auto;
  }

  .toolbar-sep {
    width: 80%;
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  .tool-icon-btn {
    background: var(--btn);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    width: 38px; height: 38px;
    cursor: pointer;
    font-size: 1.1rem;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .tool-icon-btn:hover { background: var(--btn-hover); }
  .tool-icon-btn.active { background: var(--active); border-color: var(--active); }

  .tool-icon-btn[title]:hover::after {
    content: attr(title);
    position: absolute;
    left: 46px;
    top: 50%;
    transform: translateY(-50%);
    background: #111;
    color: white;
    font-size: 0.7rem;
    padding: 3px 8px;
    border-radius: 5px;
    white-space: nowrap;
    z-index: 100;
    font-family: 'Nunito', sans-serif;
  }

  /* CANVAS AREA */
  .canvas-area {
    flex: 1;
    overflow: auto;
    background: #111827;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    padding: 20px;
    background-image: 
      radial-gradient(circle at 1px 1px, #2a2a3a 1px, transparent 0);
    background-size: 24px 24px;
  }

  #canvas-wrapper {
    position: relative;
    display: inline-block;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px #333;
    border-radius: 2px;
  }

  #mainCanvas {
    display: block;
    cursor: crosshair;
    touch-action: none;
  }

  /* STATUSBAR */
  .statusbar {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 4px 16px;
    display: flex;
    gap: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    color: #888;
  }

  .statusbar span { color: var(--accent2); }

  /* TEXT BOX */
  #textBox {
    position: absolute;
    display: none;
    border: 2px dashed #e94560;
    outline: none;
    background: transparent;
    resize: none;
    overflow: hidden;
    padding: 2px 4px;
    line-height: 1.2;
    z-index: 50;
    min-width: 60px;
    min-height: 30px;
    white-space: pre;
    cursor: text;
    font-family: 'Nunito', sans-serif;
    box-shadow: 0 0 0 1px rgba(233,69,96,0.3);
    border-radius: 2px;
  }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">🎨 PAINT<span>.</span>io</div>

  <!-- Tools row -->
  <div class="header-group">
    <label>Pincel</label>
    <input type="range" id="brushSize" min="1" max="80" value="8">
    <div class="size-display" id="sizeDisplay">8</div>
  </div>

  <div class="header-group">
    <label>Opacidad</label>
    <input type="range" id="opacity" min="1" max="100" value="100">
    <div class="size-display" id="opacityDisplay">100</div>
  </div>

  <!-- Current colors -->
  <div class="current-colors" title="Click para cambiar color">
    <div class="bg-color-box" id="bgColorBox" style="background:#ffffff;" onclick="document.getElementById('bgColorPicker').click()"></div>
    <div class="fg-color-box" id="fgColorBox" style="background:#000000;" onclick="document.getElementById('fgColorPicker').click()"></div>
    <button class="swap-btn" onclick="swapColors()" title="Intercambiar">⇄</button>
    <input type="color" id="fgColorPicker" value="#000000" style="position:absolute;opacity:0;width:0;height:0">
    <input type="color" id="bgColorPicker" value="#ffffff" style="position:absolute;opacity:0;width:0;height:0">
  </div>

  <!-- Palette -->
  <div class="palette" id="palette"></div>

  <!-- Actions -->
  <div style="display:flex;gap:6px;margin-left:auto;">
    <button class="tool-btn" onclick="undo()" title="Deshacer (Ctrl+Z)">↩</button>
    <button class="tool-btn" onclick="redo()" title="Rehacer (Ctrl+Y)">↪</button>
    <button class="tool-btn" onclick="clearCanvas()" title="Limpiar todo">🗑</button>
    <button class="tool-btn" onclick="downloadCanvas()" title="Guardar imagen">💾</button>
    <button class="tool-btn" onclick="resizeCanvas()" title="Cambiar tamaño">⤢</button>
  </div>
</header>

<div class="main">
  <!-- Left toolbar -->
  <div class="toolbar">
    <button class="tool-icon-btn active" id="btn-pencil" title="Lápiz" onclick="setTool('pencil')">✏️</button>
    <button class="tool-icon-btn" id="btn-brush" title="Pincel suave" onclick="setTool('brush')">🖌️</button>
    <button class="tool-icon-btn" id="btn-spray" title="Aerosol" onclick="setTool('spray')">💨</button>
    <button class="tool-icon-btn" id="btn-fill" title="Relleno" onclick="setTool('fill')">🪣</button>
    <button class="tool-icon-btn" id="btn-eraser" title="Borrador" onclick="setTool('eraser')">🧹</button>
    <div class="toolbar-sep"></div>
    <button class="tool-icon-btn" id="btn-line" title="Línea" onclick="setTool('line')">╱</button>
    <button class="tool-icon-btn" id="btn-rect" title="Rectángulo" onclick="setTool('rect')">▭</button>
    <button class="tool-icon-btn" id="btn-rectfill" title="Rect. relleno" onclick="setTool('rectfill')">▬</button>
    <button class="tool-icon-btn" id="btn-circle" title="Círculo" onclick="setTool('circle')">◯</button>
    <button class="tool-icon-btn" id="btn-circlefill" title="Círculo relleno" onclick="setTool('circlefill')">⬤</button>
    <button class="tool-icon-btn" id="btn-triangle" title="Triángulo" onclick="setTool('triangle')">△</button>
    <div class="toolbar-sep"></div>
    <button class="tool-icon-btn" id="btn-eyedropper" title="Cuentagotas" onclick="setTool('eyedropper')">💉</button>
    <button class="tool-icon-btn" id="btn-text" title="Texto" onclick="setTool('text')">T</button>
  </div>

  <!-- Canvas area -->
  <div class="canvas-area" id="canvasArea">
    <div id="canvas-wrapper">
      <canvas id="mainCanvas" width="1200" height="700"></canvas>
      <textarea id="textBox" spellcheck="false"></textarea>
    </div>
  </div>
</div>

<div class="statusbar">
  Herramienta: <span id="statusTool">lápiz</span>
  &nbsp;|&nbsp; Posición: <span id="statusPos">0, 0</span>
  &nbsp;|&nbsp; Tamaño: <span id="statusSize">1200 × 700</span>
  &nbsp;|&nbsp; Zoom: <span id="statusZoom">100%</span>
</div>

<script>
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
let tool = 'pencil';
let drawing = false;
let fgColor = '#000000';
let bgColor = '#ffffff';
let brushSize = 8;
let opacity = 1.0;
let startX, startY;
let snapshot;
let history = [];
let redoStack = [];
let zoom = 1;
let sprayInterval = null;

// Palette colors
const paletteColors = [
  '#000000','#ffffff','#808080','#c0c0c0',
  '#ff0000','#800000','#ff6600','#ff9900',
  '#ffff00','#808000','#00ff00','#008000',
  '#00ffff','#008080','#0000ff','#000080',
  '#ff00ff','#800080','#ff69b4','#ff1493',
  '#8b4513','#d2691e','#ffd700','#adff2f',
  '#00fa9a','#1e90ff','#9400d3','#ff4500',
];

function buildPalette() {
  const p = document.getElementById('palette');
  paletteColors.forEach(c => {
    const s = document.createElement('div');
    s.className = 'color-swatch';
    s.style.background = c;
    s.addEventListener('click', e => {
      if (e.shiftKey) { setBgColor(c); }
      else { setFgColor(c); }
    });
    s.title = c + ' (Shift+click = fondo)';
    p.appendChild(s);
  });
}

function setFgColor(c) {
  fgColor = c;
  document.getElementById('fgColorBox').style.background = c;
  document.getElementById('fgColorPicker').value = c;
  document.querySelectorAll('.color-swatch.selected').forEach(s => s.classList.remove('selected'));
  document.querySelectorAll('.color-swatch').forEach(s => {
    if(s.style.background === c || rgbToHex(s.style.background) === c) s.classList.add('selected');
  });
  if(typeof textBoxActive !== 'undefined' && textBoxActive) {
    document.getElementById('textBox').style.color = c;
  }
}

function setBgColor(c) {
  bgColor = c;
  document.getElementById('bgColorBox').style.background = c;
  document.getElementById('bgColorPicker').value = c;
}

function swapColors() {
  [fgColor, bgColor] = [bgColor, fgColor];
  document.getElementById('fgColorBox').style.background = fgColor;
  document.getElementById('bgColorBox').style.background = bgColor;
  document.getElementById('fgColorPicker').value = fgColor;
  document.getElementById('bgColorPicker').value = bgColor;
}

function rgbToHex(rgb) {
  if(!rgb || rgb.startsWith('#')) return rgb;
  const result = rgb.match(/\d+/g);
  if(!result) return '#000000';
  return '#' + result.slice(0,3).map(n => parseInt(n).toString(16).padStart(2,'0')).join('');
}

document.getElementById('fgColorPicker').addEventListener('input', e => setFgColor(e.target.value));
document.getElementById('bgColorPicker').addEventListener('input', e => setBgColor(e.target.value));

document.getElementById('brushSize').addEventListener('input', e => {
  brushSize = parseInt(e.target.value);
  document.getElementById('sizeDisplay').textContent = brushSize;
});

document.getElementById('opacity').addEventListener('input', e => {
  opacity = parseInt(e.target.value) / 100;
  document.getElementById('opacityDisplay').textContent = e.target.value;
});

// Fill canvas white initially
ctx.fillStyle = '#ffffff';
ctx.fillRect(0, 0, canvas.width, canvas.height);
saveHistory();

function setTool(t) {
  tool = t;
  document.querySelectorAll('.tool-icon-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + t);
  if(btn) btn.classList.add('active');
  document.getElementById('statusTool').textContent = t;
  canvas.style.cursor = t === 'eyedropper' ? 'crosshair' : 
                         t === 'fill' ? 'cell' :
                         t === 'text' ? 'text' : 'crosshair';
}

function saveHistory() {
  history.push(canvas.toDataURL());
  if(history.length > 40) history.shift();
  redoStack = [];
}

function undo() {
  if(history.length <= 1) return;
  redoStack.push(history.pop());
  const img = new Image();
  img.src = history[history.length - 1];
  img.onload = () => ctx.drawImage(img, 0, 0);
}

function redo() {
  if(!redoStack.length) return;
  const state = redoStack.pop();
  history.push(state);
  const img = new Image();
  img.src = state;
  img.onload = () => ctx.drawImage(img, 0, 0);
}

function clearCanvas() {
  if(!confirm('¿Limpiar todo el lienzo?')) return;
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  saveHistory();
}

function downloadCanvas() {
  const a = document.createElement('a');
  a.download = 'paint-obra.png';
  a.href = canvas.toDataURL();
  a.click();
}

function resizeCanvas() {
  const w = parseInt(prompt('Ancho (px):', canvas.width));
  const h = parseInt(prompt('Alto (px):', canvas.height));
  if(!w || !h || w < 10 || h < 10) return;
  const data = canvas.toDataURL();
  canvas.width = w;
  canvas.height = h;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, w, h);
  const img = new Image();
  img.src = data;
  img.onload = () => { ctx.drawImage(img, 0, 0); saveHistory(); };
  document.getElementById('statusSize').textContent = `${w} × ${h}`;
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY
  };
}

// Drawing setup
function setupCtx(isEraser=false) {
  ctx.globalAlpha = opacity;
  ctx.lineWidth = brushSize;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  if(isEraser) {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,1)';
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = fgColor;
    ctx.fillStyle = fgColor;
  }
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', e => { e.preventDefault(); startDraw(e); }, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); draw(e); }, {passive:false});
canvas.addEventListener('touchend', e => { e.preventDefault(); endDraw(e); }, {passive:false});

canvas.addEventListener('mousemove', e => {
  const p = getPos(e);
  document.getElementById('statusPos').textContent = `${Math.round(p.x)}, ${Math.round(p.y)}`;
});

function startDraw(e) {
  drawing = true;
  const p = getPos(e);
  startX = p.x; startY = p.y;

  if(tool === 'fill') {
    floodFill(Math.round(p.x), Math.round(p.y));
    saveHistory();
    drawing = false;
    return;
  }

  if(tool === 'eyedropper') {
    const pixel = ctx.getImageData(Math.round(p.x), Math.round(p.y), 1, 1).data;
    const hex = '#' + [pixel[0],pixel[1],pixel[2]].map(v => v.toString(16).padStart(2,'0')).join('');
    setFgColor(hex);
    drawing = false;
    return;
  }

  if(tool === 'text') {
    openTextBox(p.x, p.y);
    drawing = false;
    return;
  }

  snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);

  if(tool === 'pencil' || tool === 'brush' || tool === 'eraser') {
    setupCtx(tool === 'eraser');
    if(tool === 'brush') {
      ctx.shadowBlur = brushSize;
      ctx.shadowColor = fgColor;
    }
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  }

  if(tool === 'spray') {
    startSpray(p.x, p.y);
  }
}

function draw(e) {
  if(!drawing) return;
  const p = getPos(e);

  if(tool === 'pencil' || tool === 'brush' || tool === 'eraser') {
    setupCtx(tool === 'eraser');
    if(tool === 'brush') {
      ctx.shadowBlur = brushSize * 0.8;
      ctx.shadowColor = fgColor;
    } else {
      ctx.shadowBlur = 0;
    }
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    return;
  }

  if(tool === 'spray') {
    sprayAt(p.x, p.y);
    return;
  }

  // Shape tools - restore snapshot first
  ctx.putImageData(snapshot, 0, 0);
  ctx.globalAlpha = opacity;
  ctx.globalCompositeOperation = 'source-over';
  ctx.shadowBlur = 0;
  ctx.strokeStyle = fgColor;
  ctx.fillStyle = fgColor;
  ctx.lineWidth = brushSize;
  ctx.lineCap = 'round';

  const w = p.x - startX, h = p.y - startY;

  ctx.beginPath();
  if(tool === 'line') {
    ctx.moveTo(startX, startY);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
  } else if(tool === 'rect') {
    ctx.strokeRect(startX, startY, w, h);
  } else if(tool === 'rectfill') {
    ctx.fillRect(startX, startY, w, h);
  } else if(tool === 'circle') {
    const rx = Math.abs(w)/2, ry = Math.abs(h)/2;
    ctx.ellipse(startX + w/2, startY + h/2, rx, ry, 0, 0, Math.PI*2);
    ctx.stroke();
  } else if(tool === 'circlefill') {
    const rx = Math.abs(w)/2, ry = Math.abs(h)/2;
    ctx.ellipse(startX + w/2, startY + h/2, rx, ry, 0, 0, Math.PI*2);
    ctx.fill();
  } else if(tool === 'triangle') {
    ctx.moveTo(startX + w/2, startY);
    ctx.lineTo(p.x, p.y);
    ctx.lineTo(startX, p.y);
    ctx.closePath();
    ctx.stroke();
  }
}

function endDraw() {
  if(!drawing) return;
  drawing = false;
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  if(sprayInterval) { clearInterval(sprayInterval); sprayInterval = null; }
  if(tool !== 'fill' && tool !== 'eyedropper' && tool !== 'text') {
    saveHistory();
  }
}

// Spray
function sprayAt(x, y) {
  ctx.globalAlpha = 0.05;
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = fgColor;
  const density = brushSize * 3;
  for(let i = 0; i < density; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = Math.random() * brushSize * 2;
    ctx.fillRect(x + Math.cos(angle)*r, y + Math.sin(angle)*r, 1.5, 1.5);
  }
}

function startSpray(x, y) {
  sprayAt(x, y);
  sprayInterval = setInterval(() => {
    if(drawing) sprayAt(startX, startY);
  }, 30);
}

canvas.addEventListener('mousemove', e => {
  if(tool === 'spray' && drawing) {
    const p = getPos(e);
    startX = p.x; startY = p.y;
  }
});

// Flood Fill
function floodFill(x, y) {
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;
  const idx = (y * canvas.width + x) * 4;
  const targetR = data[idx], targetG = data[idx+1], targetB = data[idx+2], targetA = data[idx+3];
  
  const hexToRgb = hex => {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return [r,g,b];
  };
  
  const [fillR, fillG, fillB] = hexToRgb(fgColor);
  if(targetR===fillR && targetG===fillG && targetB===fillB) return;

  const matchColor = (i) => {
    return Math.abs(data[i]-targetR)<30 && Math.abs(data[i+1]-targetG)<30 && 
           Math.abs(data[i+2]-targetB)<30 && Math.abs(data[i+3]-targetA)<30;
  };

  const stack = [[x, y]];
  const visited = new Uint8Array(canvas.width * canvas.height);

  while(stack.length) {
    const [cx, cy] = stack.pop();
    if(cx<0||cy<0||cx>=canvas.width||cy>=canvas.height) continue;
    const ci = cy * canvas.width + cx;
    if(visited[ci]) continue;
    visited[ci] = 1;
    const di = ci * 4;
    if(!matchColor(di)) continue;
    data[di] = fillR; data[di+1] = fillG; data[di+2] = fillB; data[di+3] = 255;
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
  ctx.putImageData(imageData, 0, 0);
}

// TEXT BOX
const textBox = document.getElementById('textBox');
let textBoxActive = false;
let textBoxCanvasX = 0, textBoxCanvasY = 0;

function openTextBox(canvasX, canvasY) {
  // Commit any existing textbox first
  if(textBoxActive) commitTextBox();

  const rect = canvas.getBoundingClientRect();
  const scaleX = rect.width / canvas.width;
  const scaleY = rect.height / canvas.height;

  const screenX = canvasX * scaleX;
  const screenY = canvasY * scaleY;

  const fontSize = brushSize * 2 + 8;

  textBox.style.display = 'block';
  textBox.style.left = screenX + 'px';
  textBox.style.top = (screenY - fontSize) + 'px';
  textBox.style.color = fgColor;
  textBox.style.fontSize = fontSize + 'px';
  textBox.style.width = '200px';
  textBox.style.height = (fontSize + 10) + 'px';
  textBox.value = '';
  textBoxActive = true;
  textBoxCanvasX = canvasX;
  textBoxCanvasY = canvasY;

  setTimeout(() => textBox.focus(), 10);
}

function commitTextBox() {
  if(!textBoxActive) return;
  const text = textBox.value;
  if(text.trim()) {
    const fontSize = brushSize * 2 + 8;
    ctx.globalAlpha = opacity;
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = fgColor;
    ctx.font = `${fontSize}px Nunito, sans-serif`;
    // Draw each line
    const lines = text.split('\n');
    lines.forEach((line, i) => {
      ctx.fillText(line, textBoxCanvasX, textBoxCanvasY + i * fontSize * 1.2);
    });
    saveHistory();
  }
  textBox.style.display = 'none';
  textBox.value = '';
  textBoxActive = false;
}

// Auto-resize textbox as user types
textBox.addEventListener('input', () => {
  const fontSize = brushSize * 2 + 8;
  const lines = textBox.value.split('\n');
  const longestLine = lines.reduce((a, b) => a.length > b.length ? a : b, '');
  // Measure text width roughly
  ctx.font = `${fontSize}px Nunito, sans-serif`;
  const w = Math.max(120, ctx.measureText(longestLine).width + 20);
  const h = Math.max(fontSize + 10, lines.length * fontSize * 1.2 + 10);
  textBox.style.width = w + 'px';
  textBox.style.height = h + 'px';
});

// Commit on Enter (without Shift), allow Shift+Enter for new line
textBox.addEventListener('keydown', e => {
  if(e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    commitTextBox();
  }
  if(e.key === 'Escape') {
    textBox.style.display = 'none';
    textBox.value = '';
    textBoxActive = false;
  }
  // Stop other shortcuts while typing
  e.stopPropagation();
});

// Commit when clicking outside textbox (on canvas or elsewhere)
canvas.addEventListener('mousedown', e => {
  if(textBoxActive && tool === 'text') {
    commitTextBox();
    // startDraw will handle opening a new one
    return;
  }
  if(textBoxActive) {
    commitTextBox();
  }
}, true); // capture phase so it runs before startDraw

document.addEventListener('mousedown', e => {
  if(textBoxActive && e.target !== textBox && e.target !== canvas) {
    commitTextBox();
  }
});

// Update textbox color live when fgColor changes
const origSetFgColor = setFgColor;
// patch: update textbox color if active
function updateTextBoxColor() {
  if(textBoxActive) textBox.style.color = fgColor;
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if(e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
  if(e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
  if(e.ctrlKey && e.key === 's') { e.preventDefault(); downloadCanvas(); }
  if(e.key === 'p') setTool('pencil');
  if(e.key === 'b') setTool('brush');
  if(e.key === 'e') setTool('eraser');
  if(e.key === 'f') setTool('fill');
  if(e.key === 'l') setTool('line');
  if(e.key === 'r') setTool('rect');
  if(e.key === 'c') setTool('circle');
  if(e.key === 'i') setTool('eyedropper');
  if(e.key === 't') setTool('text');
  if(e.key === 's' && !e.ctrlKey) setTool('spray');
  if(e.key === '[') { brushSize = Math.max(1, brushSize-2); document.getElementById('brushSize').value = brushSize; document.getElementById('sizeDisplay').textContent = brushSize; }
  if(e.key === ']') { brushSize = Math.min(80, brushSize+2); document.getElementById('brushSize').value = brushSize; document.getElementById('sizeDisplay').textContent = brushSize; }
});

// Init
buildPalette();
setFgColor('#000000');
setBgColor('#ffffff');
document.getElementById('statusSize').textContent = `${canvas.width} × ${canvas.height}`;
</script>
